<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload PDF – KIIT Prfessor Finder</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
  <div class="bg-mesh"></div>

  <!-- Loading overlay -->
  <div id="loading-widget" class="loading-overlay hidden">
    <div class="loader-spinner"></div>
    <h2 class="loading-text">Processing your Document…</h2>
    <p class="loading-sub">Analysing text and describing images</p>
  </div>

  <div class="glass-card" style="width:100%;max-width:440px;padding:36px;position:relative;z-index:1;">

    <!-- Header row -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <img src="./static/kiit-logo.png" alt="KIIT Logo" style="width:52px;height:46px;object-fit:contain;">
        <div>
          <h1 style="font-size:1.4rem;font-weight:700;">Upload PDF</h1>
          <p id="user-welcome" style="font-size:0.78rem;color:#818cf8;">Welcome</p>
        </div>
      </div>

      <div class="profile-menu-container">
        <img id="user-avatar" src="" class="profile-avatar hidden" alt="Profile">
        <div id="profile-dropdown" class="dropdown-menu hidden">
          <a href="/logout" class="dropdown-item danger">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
          </a>
        </div>
      </div>
    </div>

    <p style="color:rgba(255,255,255,0.5);font-size:0.88rem;margin-bottom:24px;">Select a PDF to begin analysing.</p>

    <div style="display:flex;flex-direction:column;gap:14px;">
      <input type="file" id="pdf-input" accept=".pdf" class="hidden">

      <label for="pdf-input" class="file-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
          <path d="M12 10v6" />
          <path d="m15 13-3-3-3 3" />
        </svg>
        Select a PDF File
      </label>

      <p style="text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.45);">
        File selected: <span id="file-name-display" style="color:rgba(255,255,255,0.85);font-weight:600;">None</span>
      </p>

      <button id="upload-btn" class="primary-btn">Upload and Start Chat</button>

      <p id="status-message" class="status-msg error"></p>
    </div>
  </div>

  <script src="/static/upload.js"></script>
</body>

</html>
