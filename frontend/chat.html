<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIIT Professor Finder</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body style="height:100vh;display:flex;flex-direction:column;overflow:hidden;">
  <div class="bg-mesh"></div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-brand">
      <img src="./static/kiit-logo.png" alt="KIIT Logo" class="header-logo">
      <div>
        <h1>KIIT Professor Finder</h1>
        <p>Ask me anything about your KIIT Professors</p>
      </div>
    </div>

    <div class="header-actions">
      <div class="user-strip hidden" id="user-strip" style="display:none;">
        <span class="label">Logged in as</span>
        <span class="name" id="user-name">Guest</span>
      </div>

      <div class="profile-menu-container">
        <img id="chat-user-avatar"
             src="https://ui-avatars.com/api/?name=Guest&background=4f46e5&color=fff"
             class="profile-avatar" alt="Profile">

        <div id="chat-profile-dropdown" class="dropdown-menu hidden">
          <button id="end-chat-btn" class="dropdown-item danger">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            End Chat &amp; Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- CHAT WINDOW -->
  <main id="chat-container" class="chat-window" style="position:relative;z-index:1;background:transparent;">

    <!-- Background mesh inside chat too -->
    <style>
      #chat-container {
        background:
          radial-gradient(120% 120% at 0% 0%,   #7a1fa2 0%, transparent 50%),
          radial-gradient(120% 120% at 50% 30%,  #5b21b6 0%, transparent 55%),
          radial-gradient(120% 120% at 100% 100%,#1e3a8a 0%, transparent 50%),
          linear-gradient(135deg, #2e1065, #1e1b4b);
      }
    </style>

    <!-- Initial bot greeting -->
    <div class="msg-row">
      <div class="msg-avatar bot-avatar">AI</div>
      <div>
        <div class="bubble bot-bubble">Hello! I&rsquo;m ready to answer your questions.</div>
        <div class="msg-time" id="init-time"></div>
      </div>
    </div>
  </main>

  <!-- INPUT BAR -->
  <footer class="input-bar" style="position:relative;z-index:5;">
    <button id="voice-btn" class="icon-btn" title="Use Microphone">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    </button>

    <input type="text" id="message-input" placeholder="Search professors, departments, research areas…" autocomplete="off">

    <button id="send-btn" class="icon-btn" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    </button>
  </footer>
  <p class="powered-by" style="padding-bottom:10px;position:relative;z-index:5;background:rgba(16,14,44,0.82);">Powered by GPT-OSS 120B</p>

  <!-- HIDDEN TEMPLATES -->
  <div id="user-message-template" class="hidden">
    <div class="msg-row user">
      <div>
        <div class="bubble user-bubble"><p></p></div>
        <div class="msg-time" style="text-align:right;"></div>
      </div>
      <div class="msg-avatar user-avatar">(◔◡◔)</div>
    </div>
  </div>

  <div id="bot-message-template" class="hidden">
    <div class="msg-row">
      <div class="msg-avatar bot-avatar">AI</div>
      <div>
        <div class="bubble bot-bubble prose"><p></p></div>
        <div class="msg-time"></div>
      </div>
    </div>
  </div>

  <div id="typing-indicator-template" class="hidden">
    <div class="msg-row">
      <div class="msg-avatar bot-avatar">AI</div>
      <div class="typing-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <script>
    // Set initial greeting time
    document.getElementById('init-time').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  </script>

  <script src="/static/script.js"></script>

  <script>
    // Tab close cleanup
    window.addEventListener('beforeunload', e => {
      e.preventDefault(); e.returnValue = '';
      navigator.sendBeacon('/end_session');
    });

    // End chat button
    document.getElementById('end-chat-btn').addEventListener('click', async () => {
      if(confirm("End chat? This will delete your session data.")) {
        await fetch('/end_session', {method:'POST'});
        window.location.href = '/';
      }
    });

    // Dropdown toggle
    const avatar = document.getElementById('chat-user-avatar');
    const dropdown = document.getElementById('chat-profile-dropdown');
    avatar.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
    document.addEventListener('click', () => dropdown.classList.add('hidden'));
  </script>
</body>
</html>
